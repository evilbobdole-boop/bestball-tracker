name: Generate Rosters JSON

# Run this ONCE manually from GitHub to create rosters.json
# After that it never needs to run again (unless you re-draft)

on:
  workflow_dispatch:  # Manual trigger only

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install openpyxl

      - name: Generate rosters.json from Excel
        run: python export_rosters_ci.py

      - name: Commit rosters.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add rosters.json
          git diff --staged --quiet || git commit -m "Generate rosters.json from Excel"
          git push
