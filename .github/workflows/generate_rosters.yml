name: Generate Rosters JSON

on:
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install openpyxl

      - name: Generate rosters.json from Excel
        run: python export_rosters_ci.py

      - name: Verify rosters.json was created
        run: |
          if [ ! -f rosters.json ]; then
            echo "ERROR: rosters.json was not created!"
            exit 1
          fi
          echo "rosters.json created ($(wc -c < rosters.json) bytes)"
          head -c 200 rosters.json

      - name: Commit and push rosters.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f rosters.json
          git status
          git commit -m "Generate rosters.json from Excel [skip ci]" || echo "Nothing new to commit"
          git push
